spring:
  ai:
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
    ollama:
      chat:
        model: Qwen3-VL:2b
        options:
          internal-tool-execution-enabled: true
      base-url: http://localhost:11434
  datasource:
    url: jdbc:mysql://localhost:3306/ai_agent?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: mysql521278
    driver-class-name: com.mysql.cj.jdbc.Driver


  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

# ===================== 新增 MyBatis-Plus 配置 =====================
mybatis-plus:
  # 实体类所在的包，用于自动扫描（请替换为你项目的实际路径）
  type-aliases-package: com.cj.imageagent.entity
  configuration:
    # 核心配置：开启自动驼峰转换
    # 这样 Java 的 messageType 就能对应数据库的 message_type
    map-underscore-to-camel-case: true
    # 开发环境建议开启 SQL 日志输出，方便查看 AI 存储动作
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 由于主键是由 Spring AI 写入的 String 类型，这里建议设为 INPUT
      id-type: input
